---
# =============================================================================
# CyberRangeCZ Sandbox Definition - Topology Definition
# PUC2 (CYNET) - Sub Case 2d: CACAO Playbook Authoring Training (Firewall IP Block)
# -----------------------------------------------------------------------------
# Schema reference:
#   https://docs.platform.cyberrange.cz/user-guide-advanced/sandboxes/topology-definition/
# Image / flavor / mgmt_user catalogue aligned with the real NG-SOC sandbox:
#   https://github.com/NG-SOC-eu/ng-soc-ansible/tree/integrations  (topology.yml)
#
# DESIGN (definitive):
#   The platform ISOLATES sandbox networks from each other: transit is not
#   forwarded between them by a multi-homed host NOR by the per-network routers
#   (confirmed by deploy diagnostics - attacker->target and soar->target were
#   unreachable across networks by every path). Only intra-network connectivity
#   works. Therefore all scenario hosts live on ONE flat network (10.10.0.0/16),
#   keeping their exact IPs, and the CACAO block is enforced HOST-BASED on the
#   Lab Target Service (nftables `input` chain), applied and verified directly by
#   the NG-SOAR executor over the flat network. A single router provides Internet
#   egress for provisioning.
# =============================================================================

name: puc2-subcase2d-cacao-firewall-ip-block

# -----------------------------------------------------------------------------
# Hosts (all on the single flat lab-net; IPs unchanged from the training docs)
# -----------------------------------------------------------------------------
hosts:
  # NG-SOAR: KMS + CACAO Validator/Executor (Docker host).
  - name: ng-soar
    base_box:
      image: ubuntu-noble-x86_64
      mgmt_user: ubuntu
      mgmt_protocol: ssh
    flavor: standard.xsmedium

  # Lab Target Service: protected HTTP/SSH service AND the host-based enforcement
  # point (nftables input drop on the malicious source IP).
  - name: lab-target
    base_box:
      image: ubuntu-noble-x86_64
      mgmt_user: ubuntu
      mgmt_protocol: ssh
    flavor: standard.small

  # Attacker: generates the "suspicious traffic from a test IP" (UML step 2);
  # its IP is the malicious source IP the CACAO playbook blocks.
  - name: attacker
    base_box:
      image: kali
      mgmt_user: debian
      mgmt_protocol: ssh
    flavor: standard.xmedium

  # Student workstation: where the trainee authors and submits the CACAO playbook.
  - name: student-ws
    base_box:
      image: ubuntu-noble-x86_64
      mgmt_user: ubuntu
      mgmt_protocol: ssh
    flavor: standard.small

  # Evaluation / Reporting: collects playbook, validation results and logs
  # to build the training summary (UML steps 15-16).
  - name: evaluation-reporting
    base_box:
      image: ubuntu-noble-x86_64
      mgmt_user: ubuntu
      mgmt_protocol: ssh
    flavor: standard.small

# -----------------------------------------------------------------------------
# Routers: a single router for Internet egress (provisioning: apt / Docker Hub).
# -----------------------------------------------------------------------------
routers:
  - name: lab-router
    base_box:
      image: debian-12-x86_64
      mgmt_user: debian
    flavor: standard.small

# -----------------------------------------------------------------------------
# WAN
# -----------------------------------------------------------------------------
wan:
  name: internet-connection
  cidr: 100.100.100.0/24

# -----------------------------------------------------------------------------
# Networks: ONE flat network. /16 so all the existing host IPs (10.10.10.10,
# 10.10.20.10, 10.10.30.x) fall inside the same subnet and see each other at L2.
# -----------------------------------------------------------------------------
networks:
  - name: lab-net
    cidr: 10.10.0.0/16
    accessible_by_user: true

# -----------------------------------------------------------------------------
# Net mappings (host -> lab-net). IPs unchanged.
# -----------------------------------------------------------------------------
net_mappings:
  - host: ng-soar
    network: lab-net
    ip: 10.10.30.10
  - host: student-ws
    network: lab-net
    ip: 10.10.30.20
  - host: evaluation-reporting
    network: lab-net
    ip: 10.10.30.30
  - host: attacker
    network: lab-net
    ip: 10.10.10.10
  - host: lab-target
    network: lab-net
    ip: 10.10.20.10

# -----------------------------------------------------------------------------
# Router mappings (router -> lab-net). The router owns .1 (default gateway).
# -----------------------------------------------------------------------------
router_mappings:
  - router: lab-router
    network: lab-net
    ip: 10.10.0.1

# -----------------------------------------------------------------------------
# Groups: empty; plays target hosts by name.
# -----------------------------------------------------------------------------
groups: []
