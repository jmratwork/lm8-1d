---
# =============================================================================
# CyberRangeCZ Sandbox Definition - Topology Definition
# PUC2 (CYNET) - Sub Case 2d: CACAO Playbook Authoring Training (Firewall IP Block)
# -----------------------------------------------------------------------------
# Schema reference:
#   https://docs.platform.cyberrange.cz/user-guide-advanced/sandboxes/topology-definition/
#
# Design notes (see README.md for the full UML -> resource mapping):
#   - "lab-firewall" is the single L3 gateway/firewall connecting the three
#     lab networks. It is therefore ON THE PATH attacker -> lab-target, so a
#     source-IP block rule is verifiable (UML steps 12-13).
#   - Each lab network also has a router to the WAN for Internet egress, which
#     is needed during provisioning (Docker Hub pulls, apt packages). Lab
#     traffic between attacker and target is forced through the firewall via
#     static routes installed by the provisioning roles.
# =============================================================================

name: puc2-subcase2d-cacao-firewall-ip-block

# -----------------------------------------------------------------------------
# Hosts (end-host virtual machines)
# -----------------------------------------------------------------------------
hosts:
  # NG-SOAR: KMS + CACAO Validator/Executor (Docker host). Runs the NG-SOAR
  # stack that validates CACAO syntax/workflow and executes the playbook
  # against the Lab Firewall. Needs more RAM for the container stack.
  - name: ng-soar
    base_box:
      image: debian-12-x86_64
      mgmt_user: debian
      mgmt_protocol: ssh
    flavor: standard.large

  # Lab Firewall: dual/tri-homed Linux host running nftables. It is the
  # gateway between attacker-net, target-net and soar-net.
  - name: lab-firewall
    base_box:
      image: debian-12-x86_64
      mgmt_user: debian
      mgmt_protocol: ssh
    flavor: standard.small

  # Lab Target Service: the service under attack (HTTP + SSH) used to verify
  # that traffic from the malicious source IP is blocked.
  - name: lab-target
    base_box:
      image: debian-12-x86_64
      mgmt_user: debian
      mgmt_protocol: ssh
    flavor: standard.small

  # Attacker: generates the "suspicious traffic from a test IP" (UML step 2).
  # Its IP is the malicious source IP that the CACAO playbook will block.
  - name: attacker
    base_box:
      image: kali-2020.4
      mgmt_user: kali
      mgmt_protocol: ssh
    flavor: standard.small

  # Student workstation: where the trainee authors and submits the CACAO
  # playbook to NG-SOAR.
  - name: student-ws
    base_box:
      image: debian-12-x86_64
      mgmt_user: debian
      mgmt_protocol: ssh
    flavor: standard.small

  # Evaluation / Reporting: collects the student playbook, validation results
  # and execution logs to build the training summary (UML steps 15-16).
  - name: evaluation-reporting
    base_box:
      image: debian-12-x86_64
      mgmt_user: debian
      mgmt_protocol: ssh
    flavor: standard.small

# -----------------------------------------------------------------------------
# Routers (provide WAN/Internet egress per network for provisioning)
# -----------------------------------------------------------------------------
routers:
  - name: soar-router
    base_box:
      image: debian-12-x86_64
      mgmt_user: debian
    flavor: standard.small

  - name: attacker-router
    base_box:
      image: debian-12-x86_64
      mgmt_user: debian
    flavor: standard.small

  - name: target-router
    base_box:
      image: debian-12-x86_64
      mgmt_user: debian
    flavor: standard.small

# -----------------------------------------------------------------------------
# WAN (Internet-facing network for routers)
# -----------------------------------------------------------------------------
wan:
  name: internet-connection
  cidr: 100.100.100.0/24

# -----------------------------------------------------------------------------
# Networks (disjoint CIDRs)
# -----------------------------------------------------------------------------
networks:
  # Management/operations network: NG-SOAR, student workstation, evaluation.
  - name: soar-net
    cidr: 10.10.30.0/24
    accessible_by_user: True

  # Network where the attacker (malicious test IP) lives.
  - name: attacker-net
    cidr: 10.10.10.0/24
    accessible_by_user: True

  # Network where the protected Lab Target Service lives.
  - name: target-net
    cidr: 10.10.20.0/24
    accessible_by_user: True

# -----------------------------------------------------------------------------
# Net mappings (host -> network, with IPs)
# The lab-firewall is intentionally connected to ALL THREE lab networks so it
# is the L3 gateway/firewall on every inter-network path.
# -----------------------------------------------------------------------------
net_mappings:
  # NG-SOAR + ops hosts on soar-net
  - host: ng-soar
    network: soar-net
    ip: 10.10.30.10
  - host: student-ws
    network: soar-net
    ip: 10.10.30.20
  - host: evaluation-reporting
    network: soar-net
    ip: 10.10.30.30

  # Lab firewall: gateway interface on each lab network (.1 of each net)
  - host: lab-firewall
    network: soar-net
    ip: 10.10.30.1
  - host: lab-firewall
    network: attacker-net
    ip: 10.10.10.1
  - host: lab-firewall
    network: target-net
    ip: 10.10.20.1

  # Attacker on attacker-net (this is the malicious test source IP)
  - host: attacker
    network: attacker-net
    ip: 10.10.10.10

  # Target service on target-net
  - host: lab-target
    network: target-net
    ip: 10.10.20.10

# -----------------------------------------------------------------------------
# Router mappings (router -> network, with IPs)
# Each network has a router on .254 connecting it to the WAN for Internet egress.
# -----------------------------------------------------------------------------
router_mappings:
  - router: soar-router
    network: soar-net
    ip: 10.10.30.254
  - router: attacker-router
    network: attacker-net
    ip: 10.10.10.254
  - router: target-router
    network: target-net
    ip: 10.10.20.254

# -----------------------------------------------------------------------------
# Ansible groups (by role) - consumed by provisioning/playbook.yml
# -----------------------------------------------------------------------------
groups:
  - name: ng_soar
    nodes:
      - ng-soar
  - name: lab_firewall
    nodes:
      - lab-firewall
  - name: lab_target
    nodes:
      - lab-target
  - name: attacker
    nodes:
      - attacker
  - name: student
    nodes:
      - student-ws
  - name: evaluation_reporting
    nodes:
      - evaluation-reporting

# -----------------------------------------------------------------------------
# Monitoring targets (services to monitor)
# -----------------------------------------------------------------------------
monitoring_targets:
  - node: ng-soar
    targets:
      - port: 443
        interface: eth0
  - node: lab-target
    targets:
      - port: 80
        interface: eth0
      - port: 22
        interface: eth0
