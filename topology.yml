---
# =============================================================================
# CyberRangeCZ Sandbox Definition - Topology Definition
# PUC2 (CYNET) - Sub Case 2d: CACAO Playbook Authoring Training (Firewall IP Block)
# -----------------------------------------------------------------------------
# Schema reference:
#   https://docs.platform.cyberrange.cz/user-guide-advanced/sandboxes/topology-definition/
# Image / flavor / mgmt_user catalogue aligned with the real NG-SOC sandbox:
#   https://github.com/NG-SOC-eu/ng-soc-ansible/tree/integrations  (topology.yml)
#     images : kali, ubuntu-noble-x86_64, debian-12-x86_64
#     flavors: standard.xmedium, standard.xsmedium, standard.small
#     note   : the Kali box is accessed with mgmt_user "debian".
#
# Design (see README.md for the full UML -> resource mapping):
#   - Faithful to the UML: attacker and lab-target live on separate networks and
#     "lab-firewall" is the L3 gateway/firewall BETWEEN them, so a source-IP
#     block is verifiable (UML steps 12-13).
#   - Per-network routers own ".1" (the subnet gateway, as in the reference and
#     as OpenStack expects). The firewall takes ".254" on each network to avoid
#     colliding with the reserved gateway/DHCP addresses.
#   - Provisioning installs static routes on attacker/lab-target so inter-lab
#     traffic is forced through the firewall (data path), while Internet egress
#     for provisioning stays via each network's router.
# =============================================================================

name: puc2-subcase2d-cacao-firewall-ip-block

# -----------------------------------------------------------------------------
# Hosts
# -----------------------------------------------------------------------------
hosts:
  # NG-SOAR: KMS + CACAO Validator/Executor (Docker host). Mirrors the reference
  # "docker-server" box that deploys the NG-SOAR docker-compose stack.
  - name: ng-soar
    base_box:
      image: ubuntu-noble-x86_64
      mgmt_user: ubuntu
      mgmt_protocol: ssh
    flavor: standard.xsmedium

  # Lab Firewall: dual/tri-homed Linux host running nftables. L3 gateway between
  # attacker-net, target-net and soar-net.
  - name: lab-firewall
    base_box:
      image: debian-12-x86_64
      mgmt_user: debian
      mgmt_protocol: ssh
    flavor: standard.small

  # Lab Target Service: the protected HTTP/SSH service (mirrors reference "victim").
  - name: lab-target
    base_box:
      image: ubuntu-noble-x86_64
      mgmt_user: ubuntu
      mgmt_protocol: ssh
    flavor: standard.small

  # Attacker: generates the "suspicious traffic from a test IP" (UML step 2).
  # Mirrors the reference "kali" box (accessed as mgmt_user "debian").
  - name: attacker
    base_box:
      image: kali
      mgmt_user: debian
      mgmt_protocol: ssh
    flavor: standard.xmedium

  # Student workstation: where the trainee authors and submits the CACAO playbook.
  - name: student-ws
    base_box:
      image: ubuntu-noble-x86_64
      mgmt_user: ubuntu
      mgmt_protocol: ssh
    flavor: standard.small

  # Evaluation / Reporting: collects playbook, validation results and logs
  # to build the training summary (UML steps 15-16).
  - name: evaluation-reporting
    base_box:
      image: ubuntu-noble-x86_64
      mgmt_user: ubuntu
      mgmt_protocol: ssh
    flavor: standard.small

# -----------------------------------------------------------------------------
# Routers (WAN/Internet egress per network; each owns the ".1" gateway)
# -----------------------------------------------------------------------------
routers:
  - name: soar-router
    base_box:
      image: debian-12-x86_64
      mgmt_user: debian
    flavor: standard.small

  - name: attacker-router
    base_box:
      image: debian-12-x86_64
      mgmt_user: debian
    flavor: standard.small

  - name: target-router
    base_box:
      image: debian-12-x86_64
      mgmt_user: debian
    flavor: standard.small

# -----------------------------------------------------------------------------
# WAN
# -----------------------------------------------------------------------------
wan:
  name: internet-connection
  cidr: 100.100.100.0/24

# -----------------------------------------------------------------------------
# Networks (disjoint CIDRs)
# -----------------------------------------------------------------------------
networks:
  - name: soar-net
    cidr: 10.10.30.0/24
    accessible_by_user: true
  - name: attacker-net
    cidr: 10.10.10.0/24
    accessible_by_user: true
  - name: target-net
    cidr: 10.10.20.0/24
    accessible_by_user: true

# -----------------------------------------------------------------------------
# Net mappings (host -> network). The firewall is on ALL THREE lab networks
# at ".254" so it is the inter-network enforcement point.
# -----------------------------------------------------------------------------
net_mappings:
  # Ops hosts on soar-net
  - host: ng-soar
    network: soar-net
    ip: 10.10.30.10
  - host: student-ws
    network: soar-net
    ip: 10.10.30.20
  - host: evaluation-reporting
    network: soar-net
    ip: 10.10.30.30

  # Lab firewall: gateway/enforcement interface on each network (.254)
  - host: lab-firewall
    network: soar-net
    ip: 10.10.30.254
  - host: lab-firewall
    network: attacker-net
    ip: 10.10.10.254
  - host: lab-firewall
    network: target-net
    ip: 10.10.20.254

  # Attacker (malicious test source IP)
  - host: attacker
    network: attacker-net
    ip: 10.10.10.10

  # Protected target service
  - host: lab-target
    network: target-net
    ip: 10.10.20.10

# -----------------------------------------------------------------------------
# Router mappings (router -> network). Each router owns ".1" (subnet gateway).
# -----------------------------------------------------------------------------
router_mappings:
  - router: soar-router
    network: soar-net
    ip: 10.10.30.1
  - router: attacker-router
    network: attacker-net
    ip: 10.10.10.1
  - router: target-router
    network: target-net
    ip: 10.10.20.1

# -----------------------------------------------------------------------------
# Groups: kept empty on purpose. Plays target hosts by name (as in the reference
# integrations topology) and use the platform auto-groups `hosts` and `routers`
# for the sandbox-logging pass. Avoids any group/host name collision.
# -----------------------------------------------------------------------------
groups: []
