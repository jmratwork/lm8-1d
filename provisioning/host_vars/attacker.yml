---
# Return route to soar-net through the Lab Firewall. Next-hop is the firewall's
# REAL attacker-net IP (derived by the lab_firewall role), .254 as fallback.
# The attacker<->target route is added by the `attacker` role and is left intact.
lab_static_routes:
  - { dest: "{{ soar_net_cidr }}", via: "{{ hostvars['lab-firewall'].fw_ip_attacker | default(fw_attacker_ip) }}" }
