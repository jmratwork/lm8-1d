---
# =============================================================================
# CyberRangeCZ Sandbox Provisioning - master playbook
# PUC2 (CYNET) - Sub Case 2d: CACAO Playbook Authoring Training
# -----------------------------------------------------------------------------
# Reference (structure, hostname targeting, sandbox-logging pass):
#   https://github.com/NG-SOC-eu/ng-soc-ansible/tree/integrations
#   https://docs.platform.cyberrange.cz/user-guide-advanced/sandboxes/sandbox-provisioning/
#
# Plays target hosts by NAME (topology `groups: []`), and the final pass uses
# the platform auto-groups `hosts` and `routers` for command logging.
# =============================================================================

# --- Baseline on every Linux host ------------------------------------------
- name: Baseline packages and scenario markers on all hosts
  hosts: hosts
  become: true
  gather_facts: true
  roles:
    - common

# --- NG-SOAR : KMS + CACAO Validator/Executor (Docker host) ----------------
- name: Deploy Docker engine and the NG-SOAR stack
  hosts: ng-soar
  become: true
  gather_facts: true
  roles:
    - docker_server      # Docker + NG-SOAR via docker-compose (integrations pattern)
    - ng_soar            # KMS content + CACAO validator/executor + toolkit/hints

# --- Lab Firewall : nftables gateway between attacker and target -----------
- name: Configure the Lab Firewall (nftables, forwarding, remote management)
  hosts: lab-firewall
  become: true
  gather_facts: true
  roles:
    - lab_firewall

# --- Lab Target Service ----------------------------------------------------
- name: Configure the Lab Target Service (web/ssh + logging)
  hosts: lab-target
  become: true
  gather_facts: true
  roles:
    - lab_target

# --- Attacker : suspicious-traffic generator (malicious test IP) -----------
- name: Configure the Attacker host (traffic generator)
  hosts: attacker
  become: true
  gather_facts: true
  roles:
    - attacker

# --- Student workstation ----------------------------------------------------
- name: Provision the Student workstation with CACAO authoring materials
  hosts: student-ws
  become: true
  gather_facts: true
  roles:
    - student_ws

# --- Evaluation / Reporting -------------------------------------------------
- name: Configure the Evaluation/Reporting host
  hosts: evaluation-reporting
  become: true
  gather_facts: true
  roles:
    - evaluation_reporting

# --- Cross-cutting config on all systems (Kali rsyslog fix + logging) ------
- name: Configure all systems (command logging, host fixes)
  hosts: all
  become: true
  gather_facts: true
  roles:
    - all

# --- Management node: syslog-ng forwarding (mirrors reference `man`) --------
- name: Configure syslog-ng forwarding on the management node
  hosts: man
  become: true
  gather_facts: true
  roles:
    - man
