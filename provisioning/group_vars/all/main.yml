---
# =============================================================================
# Shared scenario facts (non-secret) available to every play.
# Flat single-network design: host-based enforcement on lab-target.
# =============================================================================

# Single flat network (mirrors /topology.yml)
lab_net_cidr: "10.10.0.0/16"

# Key actors (IPs unchanged from the training docs)
ng_soar_ip: "10.10.30.10"
student_ws_ip: "10.10.30.20"
evaluation_ip: "10.10.30.30"

# The malicious test source IP (attacker) the CACAO playbook must block.
malicious_source_ip: "10.10.10.10"

# The protected service AND the host-based enforcement point (nftables input).
target_service_ip: "10.10.20.10"
target_service_http_port: 80
target_service_ssh_port: 22

# Management account the NG-SOAR executor uses to SSH into lab-target (apply the
# block) and into the attacker (drive the verification probe).
mgmt_user: "soar-fw"
