---
# =============================================================================
# role: router_probe   (DIAGNOSTIC ONLY - no enforcement/topology/JSON changes)
# Decides the open question: do the platform routers (.1) route between the
# sandbox networks?
#
# The forced ".254" inter-network routes are re-applied by a PERSISTENT systemd
# oneshot (soar-lab-routes.service from lab_routing), so a plain `ip route del`
# is not enough. This role:
#   1) stops + disables soar-lab-routes.service,
#   2) deletes the ".254" routes,
#   3) VERIFIES the next-hop is now the router ".1" (not ".254") BEFORE measuring,
#   4) measures attacker/ng-soar -> target over the router path (+ target-side
#      packet capture),
#   5) ALWAYS restores: re-enable + start the service AND ip route replace the
#      ".254" routes, leaving the state identical to the start.
#
# Guarded by run_router_probe (default true). Self-restoring; non-fatal.
# =============================================================================

- name: Router-path probe (disable .254 pin, verify .1 next-hop, measure, restore)
  when: run_router_probe | default(true) | bool
  block:

    # ---------------------------------------------------------------- ATTACKER
    - name: "[attacker] test attacker->target via the .1 router"
      when: inventory_hostname == 'attacker'
      block:
        - name: "[attacker] stop + disable the persistent .254 route service"
          ansible.builtin.systemd:
            name: soar-lab-routes.service
            state: stopped
            enabled: false
          failed_when: false

        - name: "[attacker] delete the forced .254 routes"
          ansible.builtin.command: "ip route del {{ item }}"
          loop:
            - "{{ target_net_cidr }}"
            - "{{ soar_net_cidr }}"
          changed_when: true
          failed_when: false

        - name: "[attacker] read next-hop to target (must be the .1 router now)"
          ansible.builtin.command: "ip route get {{ target_service_ip }}"
          register: atk_nh
          changed_when: false
          failed_when: false

        - name: "[attacker] probe attacker->target over the router path"
          ansible.builtin.shell: >
            curl -s -o /dev/null -w '%{http_code}\n' --max-time 6 http://{{ target_service_ip }}/
          register: atk_curl
          changed_when: false
          failed_when: false
      always:
        - name: "[attacker] RESTORE the .254 routes"
          ansible.builtin.command: "ip route replace {{ item }} via {{ fw_attacker_ip }}"
          loop:
            - "{{ target_net_cidr }}"
            - "{{ soar_net_cidr }}"
          changed_when: true
          failed_when: false
        - name: "[attacker] RESTORE the persistent .254 route service"
          ansible.builtin.systemd:
            name: soar-lab-routes.service
            state: started
            enabled: true
          failed_when: false

    # ----------------------------------------------------------------- NG-SOAR
    - name: "[ng-soar] test soar->target via the .1 router"
      when: inventory_hostname == 'ng-soar'
      block:
        - name: "[ng-soar] stop + disable the persistent .254 route service"
          ansible.builtin.systemd:
            name: soar-lab-routes.service
            state: stopped
            enabled: false
          failed_when: false

        - name: "[ng-soar] delete the forced .254 routes"
          ansible.builtin.command: "ip route del {{ item }}"
          loop:
            - "{{ target_net_cidr }}"
            - "{{ attacker_net_cidr }}"
          changed_when: true
          failed_when: false

        - name: "[ng-soar] read next-hop to target (must be the .1 router now)"
          ansible.builtin.command: "ip route get {{ target_service_ip }}"
          register: soar_nh
          changed_when: false
          failed_when: false

        - name: "[ng-soar] probe soar->target over the router path"
          ansible.builtin.shell: >
            curl -s -o /dev/null -w '%{http_code}\n' --max-time 6 http://{{ target_service_ip }}/
          register: soar_curl
          changed_when: false
          failed_when: false
      always:
        - name: "[ng-soar] RESTORE the .254 routes"
          ansible.builtin.command: "ip route replace {{ item }} via {{ fw_soar_ip }}"
          loop:
            - "{{ target_net_cidr }}"
            - "{{ attacker_net_cidr }}"
          changed_when: true
          failed_when: false
        - name: "[ng-soar] RESTORE the persistent .254 route service"
          ansible.builtin.systemd:
            name: soar-lab-routes.service
            state: started
            enabled: true
          failed_when: false

    # ------------------------------------------------------------- LAB-TARGET
    - name: "[lab-target] count attacker packets arriving during the probe window"
      ansible.builtin.shell: >
        timeout 6 tcpdump -ni any "src host {{ malicious_source_ip }}" -c 20 2>/dev/null | wc -l
      register: tgt_pkts
      when: inventory_hostname == 'lab-target'
      changed_when: false
      failed_when: false

    # ------------------------------------------------------------------ REPORT
    - name: Router-probe summary
      ansible.builtin.debug:
        msg:
          - "host={{ inventory_hostname }}"
          - "attacker next-hop: {{ atk_nh.stdout | default('(n/a)') }}"
          - "attacker->target http_code: {{ atk_curl.stdout | default('(n/a)') }}"
          - "attacker still-via-254?: {{ ('10.10.10.254' in (atk_nh.stdout | default(''))) }}"
          - "ng-soar next-hop: {{ soar_nh.stdout | default('(n/a)') }}"
          - "ng-soar->target http_code: {{ soar_curl.stdout | default('(n/a)') }}"
          - "ng-soar still-via-254?: {{ ('10.10.30.254' in (soar_nh.stdout | default(''))) }}"
          - "target packets seen from {{ malicious_source_ip }}: {{ tgt_pkts.stdout | default('(n/a)') }}"
