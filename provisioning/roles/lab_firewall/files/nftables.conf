#!/usr/sbin/nft -f
# Base nftables ruleset for the Lab Firewall.
# The forward chain policy is ACCEPT so attacker->target works until the
# CACAO playbook injects a drop rule for the malicious source IP.
flush ruleset

table inet filter {
    chain input {
        type filter hook input priority 0; policy accept;
    }

    chain forward {
        type filter hook forward priority 0; policy accept;
        # CACAO-injected block rules are appended here at execution time, e.g.:
        #   ip saddr <MALICIOUS_IP> counter drop
    }

    chain output {
        type filter hook output priority 0; policy accept;
    }
}

# NAT: masquerade the management/verification plane (soar-net -> lab-nets) so
# replies return via the firewall without needing return routes on the lab
# hosts. The attacker->target axis (src 10.10.10.0/24) is NOT masqueraded, so
# the CACAO source-IP block on that traffic stays fully effective.
table inet nat {
    chain postrouting {
        type nat hook postrouting priority srcnat; policy accept;
        ip saddr 10.10.30.0/24 ip daddr 10.10.10.0/24 masquerade
        ip saddr 10.10.30.0/24 ip daddr 10.10.20.0/24 masquerade
    }
}
