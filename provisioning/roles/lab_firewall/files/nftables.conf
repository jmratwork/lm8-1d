#!/usr/sbin/nft -f
# Base nftables ruleset for the Lab Firewall.
# The forward chain policy is ACCEPT so attacker->target works until the
# CACAO playbook injects a drop rule for the malicious source IP.
flush ruleset

table inet filter {
    chain input {
        type filter hook input priority 0; policy accept;
    }

    chain forward {
        type filter hook forward priority 0; policy accept;
        # CACAO-injected block rules are appended here at execution time, e.g.:
        #   ip saddr <MALICIOUS_IP> counter drop
    }

    chain output {
        type filter hook output priority 0; policy accept;
    }
}
