---
# =============================================================================
# role: net_diag
# Non-fatal network diagnostics printed into the deploy log, to reveal the REAL
# firewall interface IPs and where the soar-net<->lab-nets path breaks. All
# tasks are failed_when:false / changed_when:false. Guarded by run_net_diag.
# =============================================================================

- name: net_diag block
  when: run_net_diag | default(true) | bool
  block:
    - name: Install traceroute (best-effort)
      ansible.builtin.apt:
        name: traceroute
        state: present
      failed_when: false
      changed_when: false

    - name: Interfaces (ip -br addr)
      ansible.builtin.command: ip -br addr
      register: nd_addr
      changed_when: false
      failed_when: false

    - name: Routing table (ip route)
      ansible.builtin.command: ip route
      register: nd_route
      changed_when: false
      failed_when: false

    - name: Firewall ruleset (lab-firewall only)
      ansible.builtin.command: nft list ruleset
      register: nd_nft
      become: true
      when: inventory_hostname == 'lab-firewall'
      changed_when: false
      failed_when: false

    - name: Ping peer across the firewall
      ansible.builtin.command: "ping -c1 -W2 {{ nd_peer }}"
      register: nd_ping
      when: nd_peer | default('') | length > 0
      vars:
        nd_peer: >-
          {{ malicious_source_ip if inventory_hostname == 'ng-soar'
             else (ng_soar_ip if inventory_hostname == 'attacker' else '') }}
      changed_when: false
      failed_when: false

    - name: Traceroute peer across the firewall
      ansible.builtin.command: "traceroute -n -w2 -q1 {{ nd_peer }}"
      register: nd_trace
      when: nd_peer | default('') | length > 0
      vars:
        nd_peer: >-
          {{ malicious_source_ip if inventory_hostname == 'ng-soar'
             else (ng_soar_ip if inventory_hostname == 'attacker' else '') }}
      changed_when: false
      failed_when: false

    - name: Diagnostics summary
      ansible.builtin.debug:
        msg:
          - "host={{ inventory_hostname }}"
          - "addr: {{ nd_addr.stdout_lines | default([]) }}"
          - "route: {{ nd_route.stdout_lines | default([]) }}"
          - "nft: {{ nd_nft.stdout_lines | default('(n/a)') }}"
          - "ping: rc={{ nd_ping.rc | default('n/a') }} {{ nd_ping.stdout_lines | default([]) }}"
          - "traceroute: {{ nd_trace.stdout_lines | default('(n/a)') }}"
