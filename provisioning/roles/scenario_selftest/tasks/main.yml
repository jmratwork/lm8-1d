---
# =============================================================================
# role: scenario_selftest
# Deploy-time END-TO-END assertion of the host-based CACAO block, run on ng-soar
# as the LAST provisioning step. Turns the runtime risk into a VISIBLE failure.
#
# Flat network / host-based: the executor applies the block on lab-target
# (nftables input) and verifies by driving the attacker at the target. Readiness
# is retried (non-mutating), /execute runs EXACTLY ONCE, and the target ruleset
# is ALWAYS reloaded to base afterwards (no cacao-block-* rule left behind).
#
# Guarded by `run_scenario_selftest` (default true). Leaves no side effects.
# =============================================================================

- name: Install the instructor smoke-test script (always)
  ansible.builtin.copy:
    src: scenario-smoketest.sh
    dest: /usr/local/sbin/scenario-smoketest.sh
    owner: root
    group: root
    mode: "0750"

- name: Scenario end-to-end self-test (host-based block) with mandatory rollback
  when: run_scenario_selftest | default(true) | bool
  vars:
    selftest_executor_url: "http://127.0.0.1:9100"
    selftest_eval_url: "http://{{ evaluation_ip }}:9000"
    selftest_key: "/opt/ng-soar-cacao/keys/id_ed25519"
    selftest_ssh_opts: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=8"
    selftest_pb: >-
      {{ lookup('file', playbook_dir + '/roles/ng_soar/files/cacao-toolkit/sample_block_ip_playbook.json')
         | from_json
         | combine({'playbook_variables': {'source_ip': {'value': malicious_source_ip}}}, recursive=true) }}
  block:
    - name: Wait for the CACAO Validator/Executor API
      ansible.builtin.uri:
        url: "{{ selftest_executor_url }}/healthz"
        status_code: 200
      register: st_health
      retries: 12
      delay: 5
      until: st_health.status == 200

    - name: Readiness - executor can manage lab-target (nftables) - mandatory
      ansible.builtin.command:
        cmd: "ssh -i {{ selftest_key }} {{ selftest_ssh_opts }} {{ mgmt_user }}@{{ target_service_ip }} 'sudo nft list ruleset'"
      register: st_tgt_ready
      retries: 12
      delay: 5
      until: st_tgt_ready.rc == 0
      changed_when: false
      failed_when: false

    - name: Readiness - executor can reach the attacker over SSH - mandatory
      ansible.builtin.command:
        cmd: "ssh -i {{ selftest_key }} {{ selftest_ssh_opts }} {{ mgmt_user }}@{{ malicious_source_ip }} 'echo ready'"
      register: st_atk_ready
      retries: 12
      delay: 5
      until: st_atk_ready.rc == 0
      changed_when: false
      failed_when: false

    - name: Assert both management paths are up
      ansible.builtin.assert:
        that:
          - st_tgt_ready.rc == 0
          - st_atk_ready.rc == 0
        fail_msg: >-
          SELFTEST: executor cannot reach lab-target ({{ target_service_ip }}, rc={{ st_tgt_ready.rc }})
          or attacker ({{ malicious_source_ip }}, rc={{ st_atk_ready.rc }}) over SSH.
          Check the soar-fw key/sudo and that all hosts share the flat lab-net.

    - name: "UML 7-8 - validate the reference playbook"
      ansible.builtin.uri:
        url: "{{ selftest_executor_url }}/validate"
        method: POST
        body_format: json
        body: "{{ selftest_pb }}"
        return_content: true
      register: st_validate

    - name: Assert the playbook is approved
      ansible.builtin.assert:
        that:
          - st_validate.json.approved | bool
        fail_msg: "SELFTEST: /validate did not approve the reference playbook: {{ st_validate.json.errors | default('?') }}"

    - name: Pre-clean lab-target to its base ruleset (idempotent baseline)
      ansible.builtin.command:
        cmd: "ssh -i {{ selftest_key }} {{ selftest_ssh_opts }} {{ mgmt_user }}@{{ target_service_ip }} 'sudo nft -f /etc/nftables.conf'"
      changed_when: true
      failed_when: false

    - name: "UML 11-14 - execute the playbook EXACTLY ONCE"
      ansible.builtin.uri:
        url: "{{ selftest_executor_url }}/execute"
        method: POST
        body_format: json
        body: "{{ selftest_pb }}"
        return_content: true
      register: st_exec

    - name: Assert the host-based block succeeded end to end
      ansible.builtin.assert:
        that:
          - st_exec.status == 200
          - st_exec.json.status == "success"
          - st_exec.json.verification.state == "blocked"
          - '"BLOCKED" in st_exec.json.verification.probe_output'
          - ('cacao-block-' ~ malicious_source_ip) in st_exec.json.firewall_evidence
        fail_msg: >-
          SELFTEST: execute did not confirm the block.
          status={{ st_exec.json.status | default('?') }},
          state={{ st_exec.json.verification.state | default('?') }},
          probe={{ st_exec.json.verification.probe_output | default('?') }}.

    - name: "UML 16 - fetch the training summary and assert grade PASS"
      ansible.builtin.uri:
        url: "{{ selftest_eval_url }}/summary"
        return_content: true
      register: st_summary
      retries: 6
      delay: 5
      until:
        - st_summary.status == 200
        - st_summary.json.grade == "PASS"

    - name: Scenario self-test PASSED
      ansible.builtin.debug:
        msg: >-
          SELFTEST OK: validate=approved, execute=success/blocked on lab-target
          (evidence has cacao-block-{{ malicious_source_ip }}), summary=PASS.

  rescue:
    - name: Scenario self-test FAILED - surface a clear diagnosis
      ansible.builtin.fail:
        msg: >-
          SCENARIO SELF-TEST FAILED on ng-soar: the host-based block path is broken.
          Likely cause: the executor cannot SSH to lab-target ({{ target_service_ip }})
          to apply the nft input rule, or to the attacker ({{ malicious_source_ip }})
          to run the verification probe (soar-fw key / passwordless sudo nft), or the
          hosts are not on the same flat lab-net.
          validate={{ st_validate.json | default('n/a') }} ;
          execute={{ st_exec.json.status | default('n/a') }}/{{ st_exec.json.verification.state | default('n/a') }} ;
          summary={{ st_summary.json.grade | default('n/a') }}.

  always:
    - name: ROLLBACK - reload lab-target base ruleset (clean baseline)
      ansible.builtin.command:
        cmd: "ssh -i {{ selftest_key }} {{ selftest_ssh_opts }} {{ mgmt_user }}@{{ target_service_ip }} 'sudo nft -f /etc/nftables.conf'"
      changed_when: true
      failed_when: false

    - name: ROLLBACK - confirm no cacao-block-* rules remain on lab-target
      ansible.builtin.command:
        cmd: "ssh -i {{ selftest_key }} {{ selftest_ssh_opts }} {{ mgmt_user }}@{{ target_service_ip }} 'sudo nft list ruleset'"
      register: st_ruleset_after
      changed_when: false
      failed_when: '"cacao-block-" in st_ruleset_after.stdout'
