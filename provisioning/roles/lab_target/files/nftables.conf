#!/usr/sbin/nft -f
# Base nftables ruleset for the Lab Target Service (host-based enforcement point).
# The input chain policy is ACCEPT so the attacker can reach the service until
# the CACAO playbook injects an input drop rule for the malicious source IP.
flush ruleset

table inet filter {
    chain input {
        type filter hook input priority 0; policy accept;
        # CACAO-injected block rules are appended here at execution time, e.g.:
        #   ip saddr <MALICIOUS_IP> counter drop comment "cacao-block-<MALICIOUS_IP>"
    }

    chain forward {
        type filter hook forward priority 0; policy accept;
    }

    chain output {
        type filter hook output priority 0; policy accept;
    }
}
