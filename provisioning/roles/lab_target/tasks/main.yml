---
# =============================================================================
# role: lab_target
# The protected service (HTTP + SSH) AND the host-based enforcement point:
# the NG-SOAR executor applies an nftables `input` drop rule here (UML 12) and
# the block is verified by driving the attacker at this service (UML 13).
# =============================================================================

- name: Install web server, ssh, nftables and sudo
  ansible.builtin.apt:
    name:
      - nginx
      - openssh-server
      - nftables
      - sudo
    state: present
    update_cache: true

- name: Publish a recognizable landing page
  ansible.builtin.copy:
    dest: /var/www/html/index.html
    mode: "0644"
    content: |
      <html><body>
      <h1>Lab Target Service</h1>
      <p>PUC2 Sub Case 2d - this service is the attack target.</p>
      </body></html>

- name: Ensure nginx and ssh are running
  ansible.builtin.service:
    name: "{{ item }}"
    state: started
    enabled: true
  loop:
    - nginx
    - ssh

# --- Host-based firewall (nftables input chain) -----------------------------
- name: Deploy base nftables ruleset (input policy accept)
  ansible.builtin.copy:
    src: nftables.conf
    dest: /etc/nftables.conf
    mode: "0755"
  notify: reload nftables

- name: Ensure nftables is enabled and started
  ansible.builtin.service:
    name: nftables
    state: started
    enabled: true

# --- Management account the NG-SOAR executor uses to apply the block ---------
- name: Create the NG-SOAR management user on the target
  ansible.builtin.user:
    name: "{{ mgmt_user }}"
    shell: /bin/bash
    create_home: true

- name: Grant passwordless sudo limited to nft
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ mgmt_user }}"
    mode: "0440"
    content: "{{ mgmt_user }} ALL=(root) NOPASSWD: /usr/sbin/nft\n"
    validate: "visudo -cf %s"

- name: Authorize the NG-SOAR executor public key (from the ng-soar host fact)
  ansible.posix.authorized_key:
    user: "{{ mgmt_user }}"
    state: present
    key: "{{ hostvars['ng-soar']['soar_executor_pubkey'] | default(soar_fw_authorized_key) }}"
