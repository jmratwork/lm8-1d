---
# =============================================================================
# role: lab_routing
# Installs the symmetric static routes that let soar-net hosts and the lab
# networks reach each other THROUGH the Lab Firewall (pure routing, no NAT, so
# source IPs are preserved and the CACAO source-IP block stays verifiable).
#
# Per-host routes come from `lab_static_routes` (see host_vars/<host>.yml):
#   lab_static_routes:
#     - { dest: "10.10.10.0/24", via: "10.10.30.254" }
#     - ...
# Routes are applied immediately AND persisted via an idempotent systemd
# oneshot so they survive a reboot. This role does NOT touch the pre-existing
# attacker<->target routes (they live in the attacker/lab_target roles).
# =============================================================================

- name: Apply lab static routes immediately
  ansible.builtin.command:
    cmd: "ip route replace {{ item.dest }} via {{ item.via }}"
  loop: "{{ lab_static_routes | default([]) }}"
  changed_when: false
  failed_when: false

- name: Install the boot-time route script (idempotent)
  ansible.builtin.copy:
    dest: /usr/local/sbin/soar-lab-routes.sh
    mode: "0755"
    content: |
      #!/usr/bin/env bash
      # PUC2 2d - re-apply lab static routes at boot (idempotent).
      {% for r in lab_static_routes | default([]) %}
      ip route replace {{ r.dest }} via {{ r.via }}
      {% endfor %}
      exit 0

- name: Install the soar-lab-routes systemd oneshot unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/soar-lab-routes.service
    mode: "0644"
    content: |
      [Unit]
      Description=PUC2 2d lab static routes (soar-net <-> lab-nets via firewall)
      After=network-online.target
      Wants=network-online.target
      [Service]
      Type=oneshot
      ExecStart=/usr/local/sbin/soar-lab-routes.sh
      RemainAfterExit=yes
      [Install]
      WantedBy=multi-user.target

- name: Enable and start soar-lab-routes
  ansible.builtin.systemd:
    name: soar-lab-routes.service
    enabled: true
    daemon_reload: true
    state: started
  failed_when: false
