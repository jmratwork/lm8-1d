---
# =============================================================================
# role: student_ws
# Trainee workstation: exercise brief (UML 3), local copy of the CACAO toolkit
# (UML 5) and the cacao-client used to submit/correct/execute (UML 4,6,9,11,16).
# Host image is ubuntu-noble-x86_64 (mgmt_user: ubuntu).
# =============================================================================

- name: Install client tooling
  ansible.builtin.apt:
    name:
      - curl
      - jq
    state: present
    update_cache: true

- name: Create the trainee CACAO workspace
  ansible.builtin.file:
    path: /home/ubuntu/cacao
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0755"

- name: Deliver the exercise brief (UML step 3)
  ansible.builtin.copy:
    src: EXERCISE_BRIEF.md
    dest: /home/ubuntu/cacao/EXERCISE_BRIEF.md
    owner: ubuntu
    group: ubuntu
    mode: "0644"

- name: Deliver the NG-SOC detection evidence (suspicious traffic log)
  ansible.builtin.copy:
    src: detected_traffic.log
    dest: /home/ubuntu/cacao/detected_traffic.log
    owner: ubuntu
    group: ubuntu
    mode: "0644"

- name: Deliver the CACAO toolkit locally (templates, hints, supported commands)
  ansible.builtin.copy:
    src: "{{ role_path }}/../ng_soar/files/cacao-toolkit/"
    dest: /home/ubuntu/cacao/
    owner: ubuntu
    group: ubuntu
    mode: "0644"

- name: Install the cacao-client helper
  ansible.builtin.copy:
    src: cacao-client.sh
    dest: /usr/local/bin/cacao-client
    mode: "0755"

- name: Install the instructor smoke-test script (per-level checks)
  ansible.builtin.copy:
    src: "{{ role_path }}/../scenario_selftest/files/scenario-smoketest.sh"
    dest: /usr/local/sbin/scenario-smoketest.sh
    owner: root
    group: root
    mode: "0750"

- name: Point the client at NG-SOAR and Evaluation/Reporting
  ansible.builtin.copy:
    dest: /etc/profile.d/cacao-client.sh
    mode: "0644"
    content: |
      export NG_SOAR_URL="http://{{ ng_soar_ip }}:9100"
      export EVAL_URL="http://{{ evaluation_ip }}:9000"
