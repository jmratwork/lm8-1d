---
# =============================================================================
# APG Variables (optional) - variant answers for the training.
# Schema:
#   https://docs.platform.cyberrange.cz/user-guide-advanced/sandboxes/apg-variables/
#   supported types: username | password | port | text | IP
#
# For PUC2 Sub Case 2d the trainee's "answer" is the malicious source IP they
# must block (and the service port they protect). Declaring them as APG
# variables enables variant answers across a sandbox pool.
# =============================================================================

# The malicious source IP the student must identify and block in the firewall.
malicious_source_ip:
  type: IP

# The port of the protected Lab Target Service.
target_service_port:
  type: port
  min: 1024
  max: 65000
  prohibited: [22]
